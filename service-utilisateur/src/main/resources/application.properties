# ================================================================
#  SGITU ? Service Utilisateur (G3) ? Port 8083
# ================================================================
spring.application.name=user-service
# -- Serveur --
server.port=8083
server.servlet.context-path=/api
# -- Base de donnees PostgreSQL --
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver
# -- JPA / Hibernate --
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# -- JWT (G3 est l emetteur officiel -- G10 valide uniquement) --
# Cle partagee avec G10 pour la validation de signature (min 256 bits)
jwt.secret=SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!
# Duree de validite du token en secondes (86400 = 24h)
jwt.expiration=${JWT_EXPIRATION:86400}
# -- Swagger / OpenAPI --
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
# -- Outgoing events -- G8: Analyse & donnees --
# G8 ingestion endpoint: /api/v1/ingestion/users
# Set G8_BASE_URL to G8 container name + port (e.g. http://g8-service:8080)
# Leave blank to disable silently (safe default when G8 is not running).
events.user-status.url=${G8_BASE_URL:}/api/v1/ingestion/users
