# Stack G4 complète — intégration « sans couture » + monitoring
#
# Lance : G4 + PostgreSQL + Kafka + G5 (notifications) + Prometheus + Grafana
# Réseau : sgitu-network (compatible avec le docker-compose racine du monorepo)
#
# Usage :
#   cp .env.example .env
#   docker compose -f docker-compose.full-stack.yml up -d --build
#
# URLs :
#   G4 API      http://localhost:8084
#   G4 health   http://localhost:8084/api/g4/health
#   G4 logs     http://localhost:8084/api/g4/logs
#   Prometheus  http://localhost:9090
#   Grafana     http://localhost:3000  (admin / admin)
#   G5          http://localhost:8085

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: sgitu-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - sgitu-network

  postgres:
    image: postgres:16-alpine
    container_name: sgitu-g4-postgres
    environment:
      POSTGRES_DB: sgitu_g4
      POSTGRES_USER: g4
      POSTGRES_PASSWORD: g4
    ports:
      - "5434:5432"
    volumes:
      - sgitu_g4_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g4 -d sgitu_g4"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sgitu-network

  mysql-notification:
    image: mysql:8.0
    container_name: sgitu-mysql-notification
    hostname: mysql-notification
    ports:
      - "3314:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${NOTIFICATION_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: notifications_db
      MYSQL_USER: sgitu
      MYSQL_PASSWORD: ${NOTIFICATION_MYSQL_PASSWORD:-sgitu}
    volumes:
      - mysql_notification_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${NOTIFICATION_MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sgitu-network

  notification-service:
    build:
      context: ../service-notification
      dockerfile: Dockerfile
    container_name: g5-notification-service
    hostname: notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification:3306/notifications_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sgitu
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_MYSQL_PASSWORD:-sgitu}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025
      JWT_SECRET: ${SGITU_JWT_SECRET:-SGlUVS1HNC1KV1QtU0VDUkVOLURFVl8xMjhCaXRzX19VU0VfRU5WX1ZBUiMjIw==}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sgitu-network

  g4-coordination:
    build: .
    container_name: g4-coordination-service
    hostname: g4-coordination
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "8084"
      JPA_DDL_AUTO: update
      SGITU_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SGITU_JWT_SECRET: ${SGITU_JWT_SECRET:-SGlUVS1HNC1KV1QtU0VDUkVOLURFVl8xMjhCaXRzX19VU0VfRU5WX1ZBUiMjIw==}
      SGITU_G3_URL: ${SGITU_G3_URL:-http://g3-user-service:8083}
      SGITU_G5_URL: http://notification-service:8085
      SGITU_G10_URL: http://notification-service:8085
      SGITU_G7_URL: ${SGITU_G7_URL:-http://g7-service:8087}
      SGITU_G1_URL: ${SGITU_G1_URL:-http://g1-billetterie:8081}
      SGITU_G9_URL: ${SGITU_G9_URL:-http://g9-incidents:8089}
      SGITU_G3_VALIDATION_ENABLED: ${SGITU_G3_VALIDATION_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sgitu-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sgitu-g4-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - g4-coordination
    networks:
      - sgitu-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sgitu-g4-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sgitu-network

volumes:
  sgitu_g4_pgdata:
  mysql_notification_data:

networks:
  sgitu-network:
    name: sgitu-network
    driver: bridge
